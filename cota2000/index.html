<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cota de Presente</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.convite{
    width:420px;
    aspect-ratio:9/16;
    background:url("cota2000.png") center center / cover no-repeat;
    position:relative;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.botao-area{
    position:absolute;
    bottom:13%;
    width:100%;
    text-align:center;
}

button{
    background:#8b5e5e;
    color:white;
    border:none;
    padding:12px 25px;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#6f4747;
}

.msg{
    margin-top:10px;
    color:#333;
}

</style>
</head>

<body>

<div class="convite">

<div class="botao-area">
<button onclick="copiarPix()">📋 Copiar código PIX</button>
<div class="msg" id="msg"></div>
</div>

</div>

<script>

function copiarPix(){

const pix = "00020126660014BR.GOV.BCB.PIX0111394171398190229Cota Presente R$2000,00 - R&B52040000530398654072000.005802BR5925RODRIGO DEGLI ESPOSTI VIT6009RIO CLARO622605226am1Sgr6niz0kpVkkt5cMS63046AD4";

navigator.clipboard.writeText(pix).then(()=>{
document.getElementById("msg").innerHTML = "✅ Código PIX copiado!";
});

}

</script>

</body>
</html>
